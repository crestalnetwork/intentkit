volumes:
  postgres_data:
  rustfs_data:
  redis_data:

services:
  db:
    image: postgres:18.1-trixie
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: intentkit
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.stateful == true

  rustfs:
    image: rustfs/rustfs:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      - RUSTFS_ACCESS_KEY=minioadmin
      - RUSTFS_SECRET_KEY=minioadmin
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.stateful == true

  redis:
    image: redis:8.4-bookworm
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    deploy:
      restart_policy:
        condition: any
      placement:
        constraints:
          - node.labels.stateful == true

  api:
    image: crestal/intentkit:latest
    env_file: .env
    environment:
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=intentkit
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - AWS_S3_CDN_URL=http://localhost:9000/static
      - AWS_S3_ENDPOINT_URL=http://rustfs:9000
      - AWS_S3_ACCESS_KEY_ID=minioadmin
      - AWS_S3_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_BUCKET=static
      - AWS_S3_REGION_NAME=us-east-1
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import requests; requests.get('http://localhost:8000/health').raise_for_status()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
    command: uvicorn app.api:app --host 0.0.0.0 --port 8000
    deploy:
      replicas: 2
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  autonomous:
    image: crestal/intentkit:latest
    env_file: .env
    environment:
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=intentkit
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - AWS_S3_CDN_URL=http://localhost:9000/static
      - AWS_S3_ENDPOINT_URL=http://rustfs:9000
      - AWS_S3_ACCESS_KEY_ID=minioadmin
      - AWS_S3_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_BUCKET=static
      - AWS_S3_REGION_NAME=us-east-1
      - INTERNAL_BASE_URL=http://api:8000
    healthcheck:
      test: ["CMD", "python", "scripts/check_heartbeat.py", "autonomous"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: python -m app.autonomous
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  scheduler:
    image: crestal/intentkit:latest
    env_file: .env
    environment:
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_NAME=intentkit
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - AWS_S3_CDN_URL=http://localhost:9000/static
      - AWS_S3_ENDPOINT_URL=http://rustfs:9000
      - AWS_S3_ACCESS_KEY_ID=minioadmin
      - AWS_S3_SECRET_ACCESS_KEY=minioadmin
      - AWS_S3_BUCKET=static
      - AWS_S3_REGION_NAME=us-east-1
    healthcheck:
      test: ["CMD", "python", "scripts/check_heartbeat.py", "scheduler"]
      interval: 10s
      timeout: 5s
      retries: 3
    command: python -m app.scheduler
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  frontend:
    image: crestal/intentkit-frontend:latest
    environment:
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
      - NEXT_PUBLIC_AWS_S3_CDN_URL=${NEXT_PUBLIC_AWS_S3_CDN_URL:-http://localhost:9000/static}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  telegram:
    image: crestal/intentkit-telegram:latest
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=intentkit
      - REDIS_HOST=redis
      - INTERNAL_BASE_URL=http://api:8000
      - TG_NEW_AGENT_POLL_INTERVAL=10
    healthcheck:
      test: ["CMD", "find", "/tmp/healthy", "-mmin", "-2"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any

  wechat:
    image: crestal/intentkit-wechat:latest
    env_file: .env
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=intentkit
      - INTERNAL_BASE_URL=http://api:8000
      - WX_NEW_CHANNEL_POLL_INTERVAL=10
    healthcheck:
      test: ["CMD", "find", "/tmp/healthy", "-mmin", "-2"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy:
        condition: any
