root = "."
tmp_dir = "tmp/telegram"

[build]
  cmd = "go build -o ./tmp/telegram/intent-telegram ./cmd/telegram"
  bin = "./tmp/telegram/intent-telegram"
  delay = 1000
  exclude_dir = ["tmp"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "mod", "sum"]
  poll = true
  poll_interval = 2000

[log]
  time = false

[misc]
  clean_on_exit = true
